services:
  - type: web
    name: smartdanfe
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn meudanfe_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartdanfe-db
          property: connectionString
    preDeployCommand: "python manage.py makemigrations && python manage.py migrate"
