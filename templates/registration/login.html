{% extends 'base.html' %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 1rem;">
    <div class="glass" style="border-radius: 32px; padding: 2.5rem; width: 100%; max-width: 440px; text-align: center; box-shadow: 0 20px 35px -8px rgba(0,0,0,0.3); transition: transform 0.3s ease;">
        <div style="margin-bottom: 2rem;">
            <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #0ea5e9, #06b6d4); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; box-shadow: 0 10px 20px -5px rgba(14,165,233,0.4);">
                <i class="fas fa-file-contract" style="font-size: 36px; color: white;"></i>
            </div>
            <h1 style="font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #fff, #cbd5e1); -webkit-background-clip: text; background-clip: text; color: transparent;">LogisTech</h1>
            <p style="color: #94a3b8; margin-top: 0.5rem;">Conversor de chaves para PDF e XML</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 1.5rem; text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #e2e8f0;">Usuário</label>
                <input type="text" name="username" autofocus autocomplete="username" required id="id_username" style="width: 100%; padding: 0.875rem 1rem; border: 1px solid #334155; border-radius: 16px; background: #1e293b; color: #f1f5f9; font-size: 1rem; transition: all 0.2s;">
            </div>
            <div style="margin-bottom: 1.5rem; text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #e2e8f0;">Senha</label>
                <input type="password" name="password" autocomplete="current-password" required id="id_password" style="width: 100%; padding: 0.875rem 1rem; border: 1px solid #334155; border-radius: 16px; background: #1e293b; color: #f1f5f9; font-size: 1rem; transition: all 0.2s;">
            </div>
            <button type="submit" style="width: 100%; padding: 0.875rem; background: linear-gradient(135deg, #0ea5e9, #06b6d4); border: none; border-radius: 40px; font-size: 1rem; font-weight: 700; color: white; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 10px rgba(14,165,233,0.3);">
                Entrar no sistema
            </button>
        </form>
        <div style="margin-top: 2rem; color: #64748b; font-size: 0.75rem; border-top: 1px solid #334155; padding-top: 1.5rem;">
            <p>© 2025 LogisTech - Soluções em Logística</p>
        </div>
    </div>
</div>

<style>
    .glass {
        background: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    input:focus {
        outline: none;
        border-color: #0ea5e9;
        box-shadow: 0 0 0 3px rgba(14,165,233,0.2);
    }
    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(14,165,233,0.4);
    }
    button:active {
        transform: translateY(0);
    }
</style>
{% endblock %}
