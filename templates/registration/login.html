{% extends 'base.html' %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">
                <i class="fas fa-file-contract"></i>
            </div>
            <h1>Bem-vindo de volta</h1>
            <p>Acesse sua conta para converter suas notas fiscais</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <label for="id_username">Usuário</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" autofocus autocomplete="username" required id="id_username" placeholder="Digite seu usuário">
                </div>
            </div>
            <div class="input-group">
                <label for="id_password">Senha</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" autocomplete="current-password" required id="id_password" placeholder="Digite sua senha">
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-arrow-right"></i> Entrar
            </button>
        </form>
        <div class="login-footer">
            <p>Não tem uma conta? <a href="{% url 'register' %}">Criar conta gratuita</a></p>
        </div>
    </div>
</div>

<style>
    /* ===== VARIÁVEIS (herdadas do base, mas redefinidas por segurança) ===== */
    :root {
        --primary: #0ea5e9;
        --primary-dark: #0284c7;
        --secondary: #f97316;
        --dark: #0f172a;
        --gray-50: #f8fafc;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-300: #cbd5e1;
        --gray-400: #94a3b8;
        --gray-500: #64748b;
        --gray-600: #475569;
        --gray-700: #334155;
        --gray-800: #1e293b;
        --gray-900: #0f172a;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        --radius-sm: 0.5rem;
        --radius-md: 1rem;
        --radius-lg: 1.5rem;
        --radius-xl: 2rem;
        --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .login-container {
        min-height: calc(100vh - 140px);
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--gray-900) 0%, var(--gray-800) 100%);
        padding: 2rem;
    }
    .login-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border-radius: var(--radius-xl);
        padding: 2.5rem;
        width: 100%;
        max-width: 440px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: var(--shadow-xl);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .login-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.4);
    }
    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .login-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, var(--primary), #06b6d4);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.2rem;
        box-shadow: 0 12px 20px -8px rgba(14, 165, 233, 0.4);
        transition: var(--transition);
    }
    .login-icon i {
        font-size: 2rem;
        color: white;
    }
    .login-header h1 {
        font-size: 1.8rem;
        font-weight: 700;
        color: white;
        margin-bottom: 0.5rem;
        letter-spacing: -0.01em;
    }
    .login-header p {
        color: var(--gray-400);
        font-size: 0.9rem;
    }
    .input-group {
        margin-bottom: 1.5rem;
        text-align: left;
    }
    .input-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--gray-200);
        font-size: 0.9rem;
    }
    .input-icon {
        position: relative;
    }
    .input-icon i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--gray-400);
        font-size: 1rem;
        transition: var(--transition);
        pointer-events: none;
    }
    .input-icon input {
        width: 100%;
        padding: 0.875rem 1rem 0.875rem 2.5rem;
        border: 1px solid var(--gray-700);
        border-radius: var(--radius-md);
        background: var(--gray-800);
        color: var(--gray-100);
        font-size: 1rem;
        transition: var(--transition);
    }
    .input-icon input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
    }
    .input-icon input:focus + i,
    .input-icon input:not(:placeholder-shown) + i {
        color: var(--primary);
    }
    .btn-login {
        width: 100%;
        padding: 0.875rem;
        background: linear-gradient(135deg, var(--primary), #06b6d4);
        border: none;
        border-radius: 40px;
        font-size: 1rem;
        font-weight: 600;
        color: white;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        box-shadow: var(--shadow-sm);
    }
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
    }
    .btn-login:active {
        transform: translateY(0);
    }
    .login-footer {
        margin-top: 2rem;
        text-align: center;
        color: var(--gray-400);
        font-size: 0.9rem;
        border-top: 1px solid var(--gray-700);
        padding-top: 1.5rem;
    }
    .login-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
        transition: var(--transition);
    }
    .login-footer a:hover {
        text-decoration: underline;
        color: #38bdf8;
    }
    @media (max-width: 480px) {
        .login-card {
            padding: 1.8rem;
        }
        .login-header h1 {
            font-size: 1.5rem;
        }
        .login-icon {
            width: 64px;
            height: 64px;
        }
        .login-icon i {
            font-size: 1.6rem;
        }
    }
</style>
{% endblock %}
