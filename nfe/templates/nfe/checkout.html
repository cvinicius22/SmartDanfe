{% extends 'base.html' %}

{% block title %}Pagamento - SmartDanfe{% endblock %}

{% block extra_head %}
<script src="https://sdk.mercadopago.com/js/v2"></script>
{% endblock %}

{% block content %}
<div class="checkout-container">
    <div class="checkout-card">
        <h1>Pagamento</h1>
        <p>Plano: <strong>{{ plan|capfirst }}</strong></p>
        <p>Valor: <strong>R$ {{ amount|floatformat:2 }}</strong></p>
        <div id="paymentBrick_container"></div>
        <input type="hidden" id="preference_id" value="{{ preference_id }}">
        <input type="hidden" id="public_key" value="{{ public_key }}">
    </div>
</div>

<style>
    .checkout-container {
        max-width: 600px;
        margin: 2rem auto;
        padding: 0 1rem;
    }
    .checkout-card {
        background: white;
        border-radius: 1rem;
        padding: 2rem;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .checkout-card h1 {
        margin-bottom: 1rem;
    }
    #paymentBrick_container {
        margin-top: 2rem;
    }
</style>

<script>
    const publicKey = document.getElementById('public_key').value;
    const preferenceId = document.getElementById('preference_id').value;
    const amount = parseFloat("{{ amount|floatformat:2 }}".replace(',', '.'));

    const mp = new MercadoPago(publicKey, {
        locale: 'pt-BR'
    });

    const bricksBuilder = mp.bricks();

    const renderPaymentBrick = async () => {
        const settings = {
            initialization: {
                amount: amount,
                preferenceId: preferenceId,
                payer: {
                    email: "{{ request.user.email|default:'cliente@smartdanfe.com.br' }}",
                    firstName: "{{ request.user.first_name }}",
                    lastName: "{{ request.user.last_name }}",
                },
            },
            customization: {
                visual: {
                    style: {
                        theme: "default",
                    },
                },
                paymentMethods: {
                    ticket: "all",
                    creditCard: "all",
                    debitCard: "all",
                    bankTransfer: "all",
                    maxInstallments: 1,
                },
            },
            callbacks: {
                onReady: () => {
                    console.log("Payment Brick ready");
                },
                onSubmit: ({ selectedPaymentMethod, formData }) => {
                    const dataToSend = {
                        ...formData,
                        preference_id: preferenceId
                    };
                    return new Promise((resolve, reject) => {
                        fetch("{% url 'process_payment' %}", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                "X-CSRFToken": getCookie("csrftoken"),
                            },
                            body: JSON.stringify(dataToSend),
                        })
                        .then(response => response.json())
                        .then(response => {
                            if (response.status === 'approved') {
                                window.location.href = "{% url 'payment_success' %}?preference_id=" + preferenceId;
                            } else {
                                alert("Pagamento não aprovado: " + (response.status || response.error));
                                reject();
                            }
                            resolve();
                        })
                        .catch(error => {
                            console.error(error);
                            alert("Erro ao processar pagamento");
                            reject();
                        });
                    });
                },
                onError: (error) => {
                    console.error(error);
                },
            },
        };
        window.paymentBrickController = await bricksBuilder.create(
            "payment",
            "paymentBrick_container",
            settings
        );
    };

    renderPaymentBrick();

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
{% endblock %}
